<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>留給妳</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{ height:100%; background:#000; font-family:-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif; overflow: hidden; }
    
    .container{ height: 100vh; overflow-y: auto; scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; }
    
    .page{ 
        height: 100vh; width: 100%; scroll-snap-align: start; 
        position: relative; overflow: hidden; 
        background: #000; 
        display: flex; align-items: center; justify-content: center;
    }
    
    /* 圖片頁：淡入+縮放 */
    .page img{ 
        position: absolute; width: 100%; height: 100%; object-fit: cover; 
        opacity: 0; transition: opacity 2.5s ease-in-out, transform 12s linear;
        transform: scale(1.05);
    }
    .page.active img{ opacity: 0.6; transform: scale(1.2); }

    /* 文字頁：延遲淡入 */
    .text-content{
        max-width: 85%; text-align: center; z-index: 1;
        opacity: 0; transition: opacity 2s ease-in-out 0.8s;
    }
    .page.active .text-content { opacity: 1; }

    .text-content p{ 
        color: rgba(255, 255, 255, 0.85); 
        font-size: 18px; line-height: 2.8; 
        letter-spacing: 0.18em; font-weight: 300; 
        text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        margin-bottom: 12px;
    }
    
    .highlight{ 
        color: #d4af37 !important; font-size: 20px !important; 
        font-weight: 600 !important; letter-spacing: 0.3em !important; 
        margin-top: 30px; display: block;
    }
    
    .audio-tip { 
        font-size: 12px !important; color: rgba(212, 175, 55, 0.4) !important; 
        margin-top: 40px; font-weight: 200; display: block;
    }

    /* 🎵 金黃色線條音樂按鈕 */
    #music {
        position: fixed; top: 35px; right: 25px; z-index: 1000;
        font-size: 28px; color: #d4af37; cursor: pointer;
        transition: all 1s ease; opacity: 0.4;
    }
    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    #music.playing { animation: rotate 6s linear infinite; opacity: 1; transform: translateX(-15px); }

    /* 忍住按鈕：初始隱藏，增加過渡 */
    .exit {
        position: fixed; bottom: 45px; left: 35px; z-index: 1000;
        color: #d4af37; font-size: 16px; text-decoration: none;
        letter-spacing: 2px; font-weight: 300; opacity: 0;
        transition: opacity 2s ease-in-out;
    }
    /* 激活狀態下的透明度 */
    .exit.show { opacity: 0.7; }
</style>
</head>
<body>

<audio id="bgm" src="bgm.mp3" loop preload="auto"></audio>
<div id="music">♫</div>
<a href="https://abm-mj.pages.dev" target="_blank" class="exit" id="exit-btn">忍住</a>

<div class="container" id="main-container"></div>

<script>
const data = [
    { text: ["我不是在做什麼網頁","也不是一時興起","只是突然發現","有些位置","不該再留給別人","<span class='audio-tip'>點擊屏幕開啟聲音</span>"], img: "p1.jpg" },
    { text: ["有些人","出現得剛剛好","剛好讓我開始","重新審視","什麼才是重要"], img: "p2.jpg" },
    { text: ["妳不是熱鬧裡的一個名字","也不是人群中的一個影子","妳是那種","讓我安靜下來之後","還會想到的人"], img: "p3.jpg" },
    { text: ["以前覺得","很多關係都差不多","後來才發現","不是每個人","都值得靠近"], img: "p4.jpg" },
    { text: ["有些話","我不太會說","但有些感覺","其實已經很明顯","明顯到藏不住"], img: "p5.jpg" },
    { text: ["不是突然的喜歡","也不是一時的情緒","是慢慢累積之後","開始變得確定"], img: "p6.jpg" },
    { text: ["我沒有很主動","也不太擅長表達","但在意的時候","其實很明顯"], img: "p7.jpg" },
    { text: ["如果只是普通的人","我不會花時間","也不會想太多","更不會做到這一步"], img: "p8.jpg" },
    { text: ["妳應該也感覺得到","我沒有說得很直接","但方向","其實已經很清楚"], img: "p9.jpg" },
    { text: ["有些事情","不用說太多","只要妳願意看","就會懂"], img: "p10.jpg" },
    { text: ["我不是想打動誰","也不是想證明什麼","來自真實的生活","對的人出現了"], img: "p11.jpg" },
    { text: ["如果你看到這裡","應該不是隨便點進來的","那我們之間","就不算完全陌生"], img: "p12.jpg" },
    { text: ["我不急","也不會逼妳","但我會在這裡","等妳做一個選擇"], img: "p13.jpg" },
    { text: ["不是所有人都會走到這一步","能看到這裡的人","其實已經不多了"], img: "p14.jpg" },
    { text: ["如果你也有一點點感覺","那就別再猶豫了","來找我","剩下的，我們慢慢說"], img: "p15.jpg" }
];

const container = document.getElementById("main-container");
const exitBtn = document.getElementById("exit-btn");

// 構造 文本頁-圖片頁 交替結構
data.forEach((item, i) => {
    // 1. 文本頁
    let textPage = document.createElement('section');
    textPage.className = 'page';
    let textHtml = `<div class="text-content">`;
    item.text.forEach((line, j) => {
        if(line.includes('audio-tip')) textHtml += line;
        else textHtml += j === item.text.length-1 ? `<p class="highlight">${line}</p>` : `<p>${line}</p>`;
    });
    textHtml += `</div>`;
    textPage.innerHTML = textHtml;
    container.appendChild(textPage);

    // 2. 圖片頁
    let imgPage = document.createElement('section');
    imgPage.className = 'page';
    imgPage.innerHTML = `<img src="${item.img}" loading="${i<1?'eager':'lazy'}">`;
    container.appendChild(imgPage);
});

// 初始化第一頁
setTimeout(() => container.children[0].classList.add('active'), 100);

let timer = null;

container.onscroll = () => {
    const scrollPos = container.scrollTop;
    const height = window.innerHeight;
    const activeIndex = Math.round(scrollPos / height);
    
    // 更新激活狀態
    Array.from(container.children).forEach((p, idx) => {
        if(idx === activeIndex) p.classList.add('active');
        else p.classList.remove('active');
    });

    // 忍住按鈕邏輯：第7頁之後開始出現 (activeIndex >= 7)
    // 每次滾動先消失，再隨文案一起浮現
    exitBtn.classList.remove('show');
    clearTimeout(timer);

    if(activeIndex >= 7) {
        timer = setTimeout(() => {
            exitBtn.classList.add('show');
        }, 1200); // 稍微比文案晚一點點出來，更有「重生」感
    }
};

const audio = document.getElementById("bgm");
const btn = document.getElementById("music");

const startAudio = () => {
    if(audio.paused) {
        audio.play().catch(()=>{});
        btn.classList.add('playing');
        const tip = document.querySelector('.audio-tip');
        if(tip) tip.style.opacity = "0";
    }
};

btn.onclick = (e) => {
    e.stopPropagation();
    if(audio.paused) startAudio();
    else { audio.pause(); btn.classList.remove('playing'); }
};
document.addEventListener("click", startAudio, {once: true});
</script>
</body>
</html>
