<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>留給妳</title>

<style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{ height:100%; background:#000; font-family:-apple-system,"PingFang TC",sans-serif; overflow: hidden; }

    /* 滾動容器 */
    .container{ height: 100vh; overflow-y: auto; scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; }
    .page{ height: 100vh; width: 100%; scroll-snap-align: start; position: relative; overflow: hidden; }
    .page img{ position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 0; }

    /* 文案層 */
    .text{
        position: absolute; bottom: 0; width: 100%; padding: 80px 20px 110px;
        text-align: center;
        background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 60%, transparent 100%);
        z-index: 1;
    }
    .text p{ color: #fff; font-size: 16px; line-height: 2; letter-spacing: 2px; }
    .highlight{ color: #d4af37; font-weight: bold; }

    /* 🎵 藍色旋轉音樂圖標 */
    #music {
        position: fixed;
        top: 30px;
        right: 30px;
        z-index: 1000;
        font-size: 34px; /* 稍微再大一點 */
        color: #007AFF; 
        cursor: pointer;
        transition: all 1s cubic-bezier(0.2, 1, 0.3, 1); /* 更有質感的滑動感 */
        display: flex;
        align-items: center;
        justify-content: center;
        width: 60px;
        height: 60px;
    }

    @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    /* 播放狀態：移動到更靠左的位置 */
    #music.playing {
        transform: translateX(-100px); /* 往左移動更多，展現空間感 */
        animation: rotate 4s linear infinite;
    }

    /* 忍住按鈕：取消邊框，保持金色字體 */
    .exit {
        position: fixed;
        bottom: 40px;
        left: 30px;
        z-index: 1000;
        color: #d4af37; 
        font-size: 17px; /* 稍微加大字號更清晰 */
        text-decoration: none;
        letter-spacing: 2px;
        padding: 5px 10px;
        animation: fade 3s infinite;
        transition: opacity 0.3s;
    }

    @keyframes fade { 
        0%, 100% { opacity: 0.3; transform: scale(0.98); } 
        50% { opacity: 0.8; transform: scale(1); } 
    }
</style>
</head>

<body>

<audio id="bgm" src="bgm.mp3" loop preload="auto"></audio>

<div id="music">♫</div>
<a href="https://abm-mj.pages.dev" target="_blank" class="exit">忍住</a>

<div class="container"></div>

<script>
const texts = [
    ["我不是在做什麼網頁","也不是一時興起","只是突然發現","有些位置","不該再留給別人"],
    ["有些人","出現得剛剛好","剛好讓我開始","重新審視","什麼才是重要"],
    ["妳不是熱鬧裡的一個名字","也不是人群中的一個影子","妳是那種","讓我安靜下來之後","還會想到的人"],
    ["以前覺得","很多關係都差不多","後來才發現","不是每個人","都值得靠近"],
    ["有些話","我不太會說","但有些感覺","其實已經很明顯","明顯到藏不住"],
    ["不是突然的喜歡","也不是一時的情緒","是慢慢累積之後","開始變得確定"],
    ["我沒有很主動","也不太擅長表達","但在意的時候","其實很明顯"],
    ["如果只是普通的人","我不會花時間","也不會想太多","更不會做到這一步"],
    ["妳應該也感覺得到","我沒有說得很直接","但方向","其實已經很清楚"],
    ["有些事情","不用說太多","只要妳願意看","就會懂"],
    ["我不是想打動誰","也不是想證明什麼","來自真實的生活","對的人出現了"],
    ["如果你看到這裡","應該不是隨便點進來的","那我們之間","就不算完全陌生"],
    ["我不急","也不會逼妳","但我會在這裡","等妳做一個選擇"],
    ["不是所有人都會走到這一步","能看到這裡的人","其實已經不多了"],
    ["如果你也有一點點感覺","那就別再猶豫了","來找我","剩下的，我們慢慢說"]
];

const container = document.querySelector(".container");
texts.forEach((t, i) => {
    let html = `<section class="page"><img src="p${i+1}.jpg" loading="${i<2?'eager':'lazy'}"><div class="text">`;
    t.forEach((line, j) => {
        html += j === t.length-1 ? `<p class="highlight">${line}</p>` : `<p>${line}</p>`;
    });
    html += `</div></section>`;
    container.innerHTML += html;
});

const audio = document.getElementById("bgm");
const btn = document.getElementById("music");

// 音樂交互
btn.onclick = (e) => {
    e.stopPropagation();
    if(audio.paused){
        audio.play();
        btn.classList.add('playing');
    } else {
        audio.pause();
        btn.classList.remove('playing');
    }
};

// 交互解鎖
document.addEventListener("click", () => {
    if(audio.paused) {
        audio.play();
        btn.classList.add('playing');
    }
}, {once: true});
</script>

</body>
</html>
